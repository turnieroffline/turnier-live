<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIVE TV · TurnierOffline</title>
<style>
:root { --accent: #ff6b00; --bg: #060810; --F: 'Impact', sans-serif; }
body, html { margin:0; padding:0; background:var(--bg); overflow:hidden; height:100vh; color: #fff; font-family: system-ui, sans-serif; }
#tv-header { position:fixed; top:0; left:0; right:0; height:110px; display:grid; grid-template-columns: 1fr 2fr 1fr; align-items:center; padding:0 40px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); }
#dynamic-title { border-left:4px solid var(--accent); padding-left:15px; font-family:var(--F); font-size:2.2rem; color: var(--accent); text-transform: uppercase; }
#clock { font-family: monospace; font-size:2.6rem; font-weight:bold; background: rgba(0,0,0,0.4); padding: 5px 25px; border-radius: 12px; border-right: 8px solid var(--accent); }
#tv-content { position: absolute; top: 110px; left: 0; width: 100vw; height: calc(100vh - 210px); display: flex; align-items: center; justify-content: center; }
.score-teams { display: flex; align-items: center; gap: 50px; margin-bottom: 20px; }
.score-team { font-family: var(--F); font-size: 6rem; letter-spacing: 2px; }
.score-num { font-family: var(--F); font-size: 11rem; color: #f0b830; letter-spacing: 20px; text-shadow: 0 0 50px rgba(240,184,48,0.3); }
#tv-footer { position:fixed; bottom:0; left:0; right:0; height:100px; background: #000; border-top:4px solid var(--accent); display:flex; align-items:center; overflow:hidden; }
#ticker-label { background: var(--accent); color: #000; font-family: var(--F); font-size: 2rem; padding: 15px 40px; z-index: 10; font-weight:bold; }
#ticker-track { white-space:nowrap; color: var(--accent); font-family: var(--F); font-size: 3.5rem; animation: tick 30s linear infinite; padding-left: 100%; }
@keyframes tick { from { transform: translateX(0); } to { transform: translateX(-200%); } }
</style>
</head>
<body>
<div id="tv-header">
    <div id="logo-area"><div id="dynamic-title">LIVE-SCORE</div></div>
    <div style="text-align: center;"><span id="event-name" style="font-family:var(--F); font-size:2.8rem; letter-spacing:2px;">LADE DATEN...</span></div>
    <div style="text-align:right"><div id="clock">00:00:00</div></div>
</div>
<div id="tv-content">
    <div id="score-view">
        <div id="runde-title" style="font-family:var(--F); color:var(--accent); font-size:2.5rem; text-align:center; margin-bottom: 20px;">BITTE WARTEN</div>
        <div class="score-teams">
            <div id="t1" class="score-team">HEIM</div>
            <div id="sc" class="score-num">0:0</div>
            <div id="t2" class="score-team">GAST</div>
        </div>
    </div>
</div>
<div id="tv-footer"><div id="ticker-label">INFO</div><div id="ticker-track">+++ WILLKOMMEN BEI TURNIEROFFLINE +++ LADE AKTUELLSTE DATEN VOM SERVER +++</div></div>
<script>
async function update() {
    try {
        const r = await fetch('live.json?t=' + Date.now());
        const d = await r.json();
        document.getElementById('event-name').textContent = d.event;
        if (d.spiel) {
            document.getElementById('t1').textContent = d.spiel.t1name;
            document.getElementById('t2').textContent = d.spiel.t2name;
            document.getElementById('sc').textContent = d.spiel.tore1 + ':' + d.spiel.tore2;
            document.getElementById('runde-title').textContent = d.spiel.runde || 'LIVE';
        }
    } catch(e) {}
}
setInterval(update, 5000); update();
setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE'); }, 1000);
</script>
</body>
</html>
