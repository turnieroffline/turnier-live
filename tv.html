<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIVE TV · TurnierOffline</title>
<style>
:root {
    --or: #ff6b00;
    --bg: #060810;
    --s1: color-mix(in srgb, #060810 85%, white 15%);
    --s2: color-mix(in srgb, #060810 75%, white 25%);
    --s3: color-mix(in srgb, #060810 65%, white 35%);
    --tx: #e8edf8;
    --mu: #6b7fa0;
    --gn: #20d472;
    --gd: #f0bc30;
    --rd: #f04060;
    --F: 'Impact', sans-serif;
}
body, html { margin:0; padding:0; background:var(--bg); overflow:hidden; height:100vh; color: var(--tx); font-family: system-ui, sans-serif; }

/* CLOUD HINT */
#cloud-badge {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; color: #3b82f6;
    padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
    letter-spacing: 1px; backdrop-filter: blur(5px); pointer-events: none;
}

#tv-header { 
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 40px; height:120px;
    background:linear-gradient(180deg, var(--s2) 0%, var(--s1) 100%);
    border-bottom:3px solid var(--or);
    box-shadow:0 2px 20px rgba(0,0,0,.5);
}
#dynamic-title { font-family:var(--F); font-size:2.8rem; letter-spacing:4px; color: var(--or); text-transform: uppercase; }
#clock { font-family: monospace; font-size:2.6rem; font-weight:bold; background: rgba(0,0,0,0.4); padding: 5px 25px; border-radius: 12px; border-right: 8px solid var(--or); }
#tv-content { position: absolute; top: 120px; left: 0; width: 100vw; height: calc(100vh - 220px); overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 0; gap: 40px; }
.tv-sec { display: none; width: 100%; max-width: 96vw; text-align: center; }
.tv-sec.on { display: block; }
.score-teams { display: flex; align-items: center; justify-content: center; gap: 50px; margin-bottom: 20px; }
.score-team { font-family: var(--F); font-size: 6rem; letter-spacing: 2px; }
.score-num { font-family: var(--F); font-size: 11rem; color: var(--gd); letter-spacing: 20px; text-shadow: 0 0 50px rgba(240,184,48,0.3); }
.tv-sub { font-family: var(--F); color: var(--or); font-size: 2.2rem; margin-bottom: 25px; letter-spacing: 3px; }
.tv-list { max-width: 1000px; margin: 0 auto; font-size: 1.6rem; color: #ccc; text-align: left; }
.tv-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.08); padding: 15px 0; }
#tv-footer { position:fixed; bottom:0; left:0; right:0; height:100px; background: #000; border-top:4px solid var(--or); display:flex; align-items:center; overflow:hidden; }
#ticker-label { background: var(--or); color: #000; font-family: var(--F); font-size: 2rem; padding: 15px 40px; z-index: 10; font-weight:bold; }
#ticker-track { white-space:nowrap; color: var(--or); font-family: var(--F); font-size: 3.5rem; animation: tick 30s linear infinite; padding-left: 100%; }
@keyframes tick { from { transform: translateX(0); } to { transform: translateX(-200%); } }
</style>
<script type="application/json" id="cloud-sync-cfg">{"which":"tv","online_tv":true,"online_handy":true,"pages":{"tabelle":true,"spielplan":true,"team":true},"labels":{"tabelle":"📊 Tabelle","spielplan":"📅 Spielplan","team":"👥 Teams","tippspiel":"🎲 Tippspiel","bilder":"📸 Fotos","sieger":"🥇 Sieger","spielregeln":"📜 Regeln","verbinden":"📱 QR-Code","party_tv":"🎉 Party-Wall","server_monitor":"🖥️ Server-Monitor"}}</script>
</head>
<body>
<div id="cloud-badge">☁️ CLOUD VERSION</div>
<div id="tv-header">
    <div id="logo-area"><div id="dynamic-title">LIVE</div></div>
    <div style="text-align: center;"><span id="event-name" style="font-family:var(--F); font-size:2.8rem; letter-spacing:2px; color:var(--tx)">LADE DATEN...</span></div>
    <div style="text-align:right"><div id="clock">00:00:00</div></div>
</div>
<div id="tv-content">
    <section class="tv-sec" data-page="live">
        <div id="runde-title" class="tv-sub">BITTE WARTEN</div>
        <div class="score-teams">
            <div id="t1" class="score-team">HEIM</div>
            <div id="sc" class="score-num">0:0</div>
            <div id="t2" class="score-team">GAST</div>
        </div>
    </section>
    <section class="tv-sec" data-page="spielstand">
        <div class="tv-sub">SPIELSTAND</div>
        <div id="tv-stand-body" class="tv-list">…</div>
    </section>
    <section class="tv-sec" data-page="teams">
        <div class="tv-sub">TEAMS</div>
        <div id="tv-teams-body" class="tv-list">…</div>
    </section>
    <section class="tv-sec" data-page="spielplan">
        <div class="tv-sub">SPIELPLAN</div>
        <div id="tv-plan-body" class="tv-list">…</div>
    </section>
    <section class="tv-sec" data-page="siegerehrung">
        <div class="tv-sub">SIEGEREHRUNG</div>
        <div id="tv-sieg-body" class="tv-list" style="text-align:center;font-size:1.8rem;">Top-Plätze nach Punkten.</div>
    </section>
    
<!-- Panel: server_monitor -->

    <section class="tv-sec" data-page="server_monitor">
        <div class="tv-sub">SERVER-STATUS</div>
        <div id="sm-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:30px; max-width:1200px; margin:40px auto;">
            <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border-top:6px solid #3b82f6;">
                <div style="font-size:1.2rem; color:var(--mu); margin-bottom:10px;">CPU</div>
                <div id="sm-cpu" style="font-size:3.5rem; font-family:var(--F); color:#3b82f6;">--%</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border-top:6px solid #a855f7;">
                <div style="font-size:1.2rem; color:var(--mu); margin-bottom:10px;">RAM</div>
                <div id="sm-ram" style="font-size:3.5rem; font-family:var(--F); color:#a855f7;">--%</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border-top:6px solid #ef4444;">
                <div style="font-size:1.2rem; color:var(--mu); margin-bottom:10px;">SSD</div>
                <div id="sm-ssd" style="font-size:3.5rem; font-family:var(--F); color:#ef4444;">--%</div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:20px; border-top:6px solid #22c55e;">
                <div style="font-size:1.2rem; color:var(--mu); margin-bottom:10px;">AKKU</div>
                <div id="sm-bat" style="font-size:3.5rem; font-family:var(--F); color:#22c55e;">--%</div>
            </div>
        </div>
    </section>
</div>
<div id="tv-footer"><div id="ticker-label">INFO</div><div id="ticker-track">+++ TURNIEROFFLINE CLOUD TV +++</div></div>
<script>
(function(){
  var cfg = { pages: {} };
  try { var el = document.getElementById('cloud-sync-cfg'); if (el && el.textContent) cfg = JSON.parse(el.textContent); } catch (e) {}
  var P = cfg.pages || {};
  var secs = document.querySelectorAll('.tv-sec');
  var activeKeys = Object.keys(P).filter(function(k){ return P[k]; });
  var currentIndex = 0;

  function rotate() {
      if (!activeKeys.length) return;
      secs.forEach(function(s){ s.classList.remove('on'); });
      var key = activeKeys[currentIndex];
      var sec = document.querySelector('.tv-sec[data-page="'+key+'"]');
      if (sec) {
          sec.classList.add('on');
          document.getElementById('dynamic-title').textContent = (cfg.labels && cfg.labels[key]) ? cfg.labels[key].split(' ')[1] : key.toUpperCase();
      }
      currentIndex = (currentIndex + 1) % activeKeys.length;
  }
  
  if (activeKeys.length > 1) setInterval(rotate, 8000);
  rotate();
})();
async function update() {
    try {
        const r = await fetch('live.json?t=' + Date.now());
        const d = await r.json();
        document.getElementById('event-name').textContent = d.event;
        if (d.spiel) {
            document.getElementById('t1').textContent = d.spiel.t1name;
            document.getElementById('t2').textContent = d.spiel.t2name;
            document.getElementById('sc').textContent = d.spiel.tore1 + ':' + d.spiel.tore2;
            document.getElementById('runde-title').textContent = d.spiel.runde || 'LIVE';
            var st = document.getElementById('tv-stand-body');
            if (st) st.innerHTML = '<div style="text-align:center;font-size:2.2rem">' + d.spiel.t1name + ' <strong style="color:#f0b830">' + d.spiel.tore1 + ':' + d.spiel.tore2 + '</strong> ' + d.spiel.t2name + '</div>';
        }
        if (d.teams && Array.isArray(d.teams)) {
            var tb = document.getElementById('tv-teams-body');
            if (tb) tb.innerHTML = d.teams.map(function(t){ return '<div class="tv-row"><span>' + (t.name||'') + '</span></div>'; }).join('') || '—';
        }
        if (d.spielplan && Array.isArray(d.spielplan)) {
            var pb = document.getElementById('tv-plan-body');
            if (pb) pb.innerHTML = d.spielplan.slice(0, 30).map(function(s){
              var n1 = s.t1name || s.team1 || '?', n2 = s.t2name || s.team2 || '?';
              return '<div class="tv-row"><span>' + n1 + ' vs ' + n2 + '</span><span>' + (s.tore1!=null ? s.tore1+':'+s.tore2 : '') + '</span></div>';
            }).join('') || '—';
        }
        if (d.tabelle) {
            var sg = document.getElementById('tv-sieg-body');
            if (sg) {
                var lines = [];
                for (var g in d.tabelle) {
                    (d.tabelle[g]||[]).slice(0,3).forEach(function(t,i){ lines.push((i+1)+'. '+(t.name||'')+' ('+(t.pkt||0)+' Pkt)'); });
                }
                sg.innerHTML = lines.length ? lines.map(function(x){return '<div style="margin:8px 0">'+x+'</div>';}).join('') : '—';
            }
        }
        if (d.server_monitor) {
            var sm = d.server_monitor;
            var set = function(id, val){ var el = document.getElementById(id); if(el) el.textContent = val; };
            set('sm-cpu', sm.cpu.pct + '%');
            set('sm-ram', sm.ram.pct + '%');
            set('sm-ssd', sm.ssd.pct + '%');
            set('sm-bat', (sm.battery.pct || 0) + '%');
        }
    } catch(e) {}
}
setInterval(update, 5000); update();
setInterval(function(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE'); }, 1000);
</script>
</body>
</html>
