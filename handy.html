<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TurnierOffline Live</title>
<style>
:root { --or: #ff6b00; --bg: #08090e; --s1: #0e1018; --s2: #141620; --s3: #1e2232; --tx: #dde3f0; --mu: #5c6880; --F: 'Impact', sans-serif; }
body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--tx); margin:0; padding-bottom: 80px; }
.hdr { position: sticky; top: 0; background: rgba(14,16,24,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--or); text-align: center; font-family: var(--F); letter-spacing: 2px; color: var(--or); }
.card { background: var(--s1); border: 1px solid var(--s3); border-radius: 16px; padding: 20px; margin: 15px; }
.score-num { font-family: var(--F); font-size: 3.5rem; color: #f0b830; letter-spacing: 10px; margin: 10px 0; }
.teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; }
.tab-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: #000; display: flex; border-top: 1px solid var(--s3); }
.nav-item { flex: 1; padding: 15px; text-align: center; color: var(--mu); text-decoration: none; font-size: 0.8rem; }
.nav-item.active { color: var(--or); }
</style>
</head>
<body>
<header class="hdr" id="event-name">TURNIEROFFLINE</header>
<div id="content">
    <div class="card" style="text-align:center">
        <div id="runde" style="font-size:0.7rem; color:var(--mu); text-transform:uppercase; letter-spacing:2px;">AKTUELLES SPIEL</div>
        <div class="teams">
            <span id="t1">HEIM</span>
            <span id="t2">GAST</span>
        </div>
        <div class="score-num" id="sc">0:0</div>
        <div style="color:#1ec96a; font-weight:bold; font-size:0.8rem;">● LIVE</div>
    </div>
    <div class="card">
        <div style="font-family:var(--F); color:var(--or); margin-bottom:10px;">TABELLE</div>
        <div id="tabelle-list">Lade Daten...</div>
    </div>
</div>
<nav class="nav">
    <a href="#" class="nav-item active">⚽ SPIEL</a>
    <a href="#" class="nav-item">📊 TABELLE</a>
    <a href="#" class="nav-item">📅 PLAN</a>
</nav>
<script>
async function update() {
    try {
        const r = await fetch('live.json?t=' + Date.now());
        const d = await r.json();
        document.getElementById('event-name').textContent = d.event;
        if (d.spiel) {
            document.getElementById('t1').textContent = d.spiel.t1name;
            document.getElementById('t2').textContent = d.spiel.t2name;
            document.getElementById('sc').textContent = d.spiel.tore1 + ':' + d.spiel.tore2;
            document.getElementById('runde').textContent = d.spiel.runde || 'LIVE';
        }
        if (d.tabelle) {
            let html = '';
            for (let g in d.tabelle) {
                html += `<div style="font-size:0.7rem; margin:10px 0 5px; color:var(--mu)">GRUPPE ${g}</div>`;
                d.tabelle[g].forEach((t, i) => {
                    html += `<div class="tab-row"><span>${i+1}. ${t.name}</span><span>${t.pkt} Pkt</span></div>`;
                });
            }
            document.getElementById('tabelle-list').innerHTML = html;
        }
    } catch(e) {}
}
setInterval(update, 10000); update();
</script>
</body>
</html>
